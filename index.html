<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONO-LINK | 歴史×学問連携デジタル年表</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>
    <style>
        /* カスタムスクロールバーのスタイリング（PC用） */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 999px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.5);
            border-radius: 999px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.8);
        }
    </style>
</head>

<body
    class="bg-slate-900 text-slate-100 font-sans min-h-screen pb-96 selection:bg-indigo-500 selection:text-white overflow-x-hidden">

    <header
        class="fixed top-0 left-0 w-full bg-slate-900/80 backdrop-blur-md shadow-lg z-50 p-4 flex justify-between items-center border-b border-slate-800">
        <div>
            <h1 class="text-xl md:text-2xl font-black text-indigo-400 tracking-wider">CHRONO-LINK</h1>
            <p class="text-[10px] md:text-xs text-slate-400">縦スクロールで時をたどり、ボタンを押して横に知識を拡張する</p>
        </div>
        <div
            class="text-[10px] md:text-xs bg-slate-800 px-3 py-1.5 rounded-xl border border-slate-700 text-slate-400 font-mono">
            PC: 縦ホイールで横スク / スマホ: スワイプ
        </div>
    </header>

    <main id="timeline-main"
        class="container mx-auto max-w-4xl mt-36 px-4 relative before:absolute before:top-0 before:bottom-0 before:left-8 before:w-0.5 before:bg-gradient-to-b before:from-indigo-500 before:to-purple-600 before:opacity-30">
    </main>

    <script>
        gsap.registerPlugin(Flip);

        // ==========================================
        // 💾 【要件クリア】完全に独立化したプロ仕様のJSONデータ構造
        // ==========================================
        const CHRONO_DB = {
            // 歴史の出来事（メイン縦軸）
            events: [
                {
                    id: "ev_thales",
                    time: "BC 6世紀頃",
                    title: "タレス、万物の根源を「水」とする",
                    description: "神話的な解釈を完全に排し、自然そのものの原因を人間の理性によって説明しようとした大転換点。これがすべての学問のスタートラインとなった。",
                    tags: ["philosophy", "math"],
                    rootNodes: ["node_thales_phil", "node_thales_math"] // 展開時のスタートノードID
                },
                {
                    id: "ev_pythagoras",
                    time: "BC 6世紀末",
                    title: "ピタゴラス学派の結成と数理哲学",
                    description: "「万物は数である」と唱え、世界のあらゆる秩序は数的な比例関係によって成り立っていると考えた、秘密組織的な思想集団。",
                    tags: ["math", "music"],
                    rootNodes: ["node_pyth_math"]
                }
            ],

            // 独立した連携情報ノード（マインドマップ構造）
            nodes: {
                "node_thales_phil": {
                    title: "🏛️ 哲学へのリンク：自然哲学の祖",
                    description: "「神の気まぐれ」ではなく、ロゴス（理性）によって世界のルールを解き明かそうとする『自然哲学』の源流となりました。",
                    tags: ["philosophy", "logos"],
                    nextNodes: ["node_thales_to_pyth"] // 連結リストとして数珠繋ぎにする
                },
                "node_thales_math": {
                    title: "📐 数学へのリンク：幾何学の証明",
                    description: "エジプトの測量技術（経験）を、世界で初めて「論理的に証明」する学問（数学）へと昇華させました。",
                    tags: ["math", "geometry"],
                    nextNodes: []
                },
                "node_thales_to_pyth": {
                    title: "⚡ ピタゴラスへの思想的影響",
                    description: "タレスの「世界の根本を探る」という態度が、のちのピタゴラスに受け継がれ、「それは数である」という思想へ進化します。",
                    tags: ["history", "connection"],
                    nextNodes: []
                },
                "node_thal_math_deep": {
                    title: "🧪 科学へのリンク：日食の予言",
                    description: "天体の運行にも法則があると見抜き、紀元前に日食を正確に予言して人々を驚かせました。",
                    tags: ["science", "astronomy"],
                    nextNodes: []
                },
                "node_pyth_math": {
                    title: "📐 数学へのリンク：ピタゴラスの定理",
                    description: "直角三角形の「$a^2 + b^2 = c^2$」を発見。数それ自体を神聖視し、宇宙の真理だと信じました。",
                    tags: ["math", "geometry"],
                    nextNodes: ["node_pyth_music", "node_pyth_cosmos"]
                },
                "node_pyth_music": {
                    title: "🎵 音楽へのリンク：音階の数理",
                    description: "弦の長さの比率（2:1で1オクターブなど）と音の美しさに気づき、世界で初めて音楽を数学的に解析しました。",
                    tags: ["music", "art"],
                    nextNodes: []
                },
                "node_pyth_cosmos": {
                    title: "🌌 天文学へのリンク：コスモスの誕生",
                    description: "宇宙の星々の動きも美しい数学的ハーモニーを奏でていると考え、宇宙を「コスモス（秩序）」と呼びました。",
                    tags: ["astronomy", "cosmos"],
                    nextNodes: []
                }
            }
        };

        // ==========================================
        // 🛠️ 【パフォーマンス最適化】動的DOM生成 ＆ レンダリング
        // ==========================================
        const mainContainer = document.getElementById('timeline-main');

        function initTimeline() {
            let htmlBuffer = '';

            CHRONO_DB.events.forEach(ev => {
                htmlBuffer += `
                    <article class="timeline-item relative mb-24 pl-12 w-full" id="${ev.id}">
                        <div class="absolute left-8 w-4 h-4 bg-indigo-500 rounded-full border-4 border-slate-900 -translate-x-1.5 z-10 shadow-[0_0_10px_rgba(99,102,241,0.8)]"></div>
                        
                        <section class="w-full max-w-2xl bg-slate-800/80 backdrop-blur-sm rounded-2xl shadow-xl border border-slate-700/50 p-6 transition-all duration-300 hover:border-slate-600">
                            <div class="flex items-center justify-between gap-4 mb-4">
                                <div class="flex items-center gap-3">
                                    <span class="bg-indigo-950/80 text-indigo-300 text-xs font-bold px-3 py-1 rounded-lg border border-indigo-800/50">${ev.time}</span>
                                    <div class="flex gap-1">
                                        ${ev.tags.map(tag => `<span class="text-xs text-slate-400 font-mono">#${tag}</span>`).join(' ')}
                                    </div>
                                </div>
                                <button onclick="toggleMindmap('${ev.id}')" class="trigger-btn bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-4 py-2 rounded-xl text-xs transition-all shadow-md flex items-center gap-2 transform hover:scale-105 active:scale-95">
                                    <span>学問の繋がりを展開</span> ➔
                                </button>
                            </div>
                            <h3 class="text-xl md:text-2xl font-black text-white mb-2 tracking-wide">${ev.title}</h3>
                            <p class="text-slate-400 text-sm leading-relaxed">${ev.description}</p>

                            <aside class="mindmap-container hidden w-full border-t border-slate-700/50 pt-5 mt-5 overflow-x-auto custom-scrollbar">
                                <div class="mindmap-track flex items-center gap-5 pb-3 w-max"></div>
                            </aside>
                        </section>
                    </article>
                `;
            });

            mainContainer.innerHTML = htmlBuffer;
        }

        // ==========================================
        // 🔄 【連結リスト追跡】ボタンを押した瞬間にノードを数珠繋ぎに生成
        // ==========================================
        function buildMindmapHTML(rootNodeIds) {
            let html = '';

            rootNodeIds.forEach(rootId => {
                let currentId = rootId;
                let isFirstOfBranch = true;

                // 連結リスト（nextNodes）を奥深くへパトロールするループ
                while (currentId && CHRONO_DB.nodes[currentId]) {
                    const node = CHRONO_DB.nodes[currentId];

                    // 2個目以降の結合には、マインドマップを象徴する矢印ノードを挟む
                    if (!isFirstOfBranch) {
                        html += `<span class="text-2xl text-indigo-500 font-black shrink-0 px-1 select-none animate-pulse">➔</span>`;
                    }

                    html += `
                        <div class="bg-slate-900/90 border-2 border-indigo-500/30 hover:border-indigo-400 p-5 rounded-2xl min-w-[290px] max-w-[340px] shadow-inner transition-all duration-300">
                            <div class="flex gap-1 mb-2">
                                ${node.tags.map(t => `<span class="bg-indigo-950 text-indigo-300 text-[10px] px-2 py-0.5 rounded-md font-mono border border-indigo-900">#${t}</span>`).join('')}
                            </div>
                            <h4 class="font-extrabold text-base md:text-lg text-white mb-2 tracking-wide">${node.title}</h4>
                            <p class="text-slate-300 text-xs md:text-sm leading-relaxed">${node.description}</p>
                        </div>
                    `;

                    isFirstOfBranch = false;

                    // 次のノードのIDへ進む（なければnullになりループ終了）
                    if (node.nextNodes && node.nextNodes.length > 0) {
                        currentId = node.nextNodes[0]; // 今回は一本道の連結リストとして追跡
                    } else {
                        currentId = null;
                    }
                }
            });

            return html;
        }

        // ==========================================
        // 🎬 【GSAP Flip】劇的ビジュアル変化 ＆ 開閉ロジック
        // ==========================================
        function toggleMindmap(eventId) {
            const article = document.getElementById(eventId);
            const container = article.querySelector('.mindmap-container');
            const track = article.querySelector('.mindmap-track');
            const button = article.querySelector('.trigger-btn');
            const eventData = CHRONO_DB.events.find(e => e.id === eventId);

            // GSAP Flipでアニメーション前の状態をパシャリと記録
            const state = Flip.getState(container);

            if (container.classList.contains('hidden')) {
                // 【最適化】開くその瞬間に初めてHTMLを組み立てて流し込む（メモリ超節約）
                track.innerHTML = buildMindmapHTML(eventData.rootNodes);

                container.classList.remove('hidden');
                button.innerHTML = '<span>繋がりを閉じる</span> ✖';
                button.classList.replace('bg-indigo-600', 'bg-slate-700');

                // ➔ 【PC＆スマホ両対応】PC用の縦ホイール➔横スクロールの仕込みを実行
                setupHorizontalWheel(container);

                // 横にニュッと拡張される超滑らかアニメーション発火
                Flip.from(state, {
                    duration: 0.45,
                    ease: "power2.out",
                    scale: true,
                    simple: true
                });
            } else {
                // 閉じる処理
                container.classList.add('hidden');
                button.innerHTML = '<span>学問の繋がりを展開</span> ➔';
                button.classList.replace('bg-slate-700', 'bg-indigo-600');

                // 【最適化】閉じたら中身のDOMを即座に消去し、ブラウザを軽く保つ
                setTimeout(() => { track.innerHTML = ''; }, 450);
            }
        }

        // ==========================================
        // 🔄 【PC＆スマホ両対応】マウスの縦回転を横スクロールに化けさせる魔法
        // ==========================================
        function setupHorizontalWheel(element) {
            if (element.dataset.wheelSet === "true") return; // 重複登録を完璧にガード

            element.addEventListener('wheel', (e) => {
                if (e.deltaY !== 0) {
                    e.preventDefault(); // 本来の画面全体の縦スクロールを一時停止
                    element.scrollLeft += e.deltaY * 1.2; // 縦の回転量をそのまま横のスクロール量へ変換（1.2倍でキビキビ動かす）
                }
            }, { passive: false }); // 制御奪取のために必須のオプション

            element.dataset.wheelSet = "true";
        }

        // 初期化実行
        initTimeline();
    </script>
</body>

</html>
